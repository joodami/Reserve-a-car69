<!DOCTYPE html>
<html lang="th">
<header class="main-header text-center p-4 p-md-5">
        <div class="header-container d-flex flex-column align-items-center justify-content-center">
            <img id="school-logo" 
                 src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" 
                 alt="โลโก้โรงเรียนพิมานพิทยาสรรค์" 
                 class="mb-3">
            
            <div class="header-text text-white">
                <h1 class="school-name fw-bold mb-1">โรงเรียนพิมานพิทยาสรรค์</h1>
                <p class="section-name fw-bold opacity-75">งานยานพาหนะ สำนักงานอำนวยการ</p>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="calendar-card-wrapper mb-5 shadow-sm">
            <h3 class="calendar-header">
                <i class="bi bi-calendar-check-fill me-2 text-primary"></i> ปฏิทินการใช้รถยนต์ส่วนราชการ
            </h3>
            <div class="calendar-container border rounded-3">
                <iframe src="https://calendar.google.com/calendar/embed?src=c_ea546f07317ff6dcdbf73cee14ab645a8e154664a02554eef13e6e08423e39c1%40group.calendar.google.com&ctz=Asia/Bangkok&mode=MONTH" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>

        <div class="booking-action-area text-center">
            <p class="text-muted small mb-3 fw-bold">📅 ตรวจสอบวันว่างแล้วกดปุ่มเพื่อจองรถ</p>
            <button id="showFormBtn" class="btn-booking-main">
                <i class="bi bi-plus-circle-fill me-2"></i> กดเพื่อจองคิวรถยนต์
            </button>
        </div>

        <div class="card-form shadow-lg border" id="formSection" style="display:none;">
            <form id="carForm">
                <div class="text-end mb-3">
                    <button type="button" id="cancelBookingBtn" class="btn btn-outline-danger btn-sm rounded-pill">❌ ยกเลิกการจอง</button>
                </div>

                <div class="form-section-card shadow-sm border-0">
                    <div class="sub-title"><i class="bi bi-person-badge me-2"></i>ข้อมูลผู้จอง</div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">วันที่ทำการจอง</label>
                            <input type="date" class="form-control" name="bookDate" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">ชื่อ-นามสกุล</label>
                            <input type="text" class="form-control" name="name" placeholder="ระบุชื่อผู้จอง" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">โทรศัพท์</label>
                            <input type="tel" class="form-control" name="tel" placeholder="08x-xxxxxxx" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">ตำแหน่ง</label>
                            <select class="form-select" name="position" required>
                                <option value="">-- เลือกตำแหน่ง --</option>
                                <option value="ผู้บริหาร">ผู้บริหาร</option>
                                <option value="ครู">ครู</option>
                                <option value="บุคลากรทางการศึกษา">บุคลากรทางการศึกษา</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section-card shadow-sm border-0">
                    <div class="sub-title"><i class="bi bi-moped me-2"></i>รายละเอียดการเดินทาง</div>
                    <label class="form-label text-primary fw-bold">รถที่ต้องการใช้</label>
                    <select class="form-select mb-3 border-primary" name="car" required>
                        <option value="">-- เลือกรถที่ต้องการใช้ --</option>
                        <option value="รถ 4 ประตู">รถ 4 ประตู</option>
                        <option value="รถตู้">รถตู้</option>
                        <option value="รถ 6 ล้อ">รถ 6 ล้อ</option>
                    </select>
                    
                    <label class="form-label fw-bold">สถานที่เดินทาง</label>
                    <input type="text" class="form-control mb-3" name="location" placeholder="ระบุจุดหมายปลายทาง" required>
                    
                    <label class="form-label fw-bold">วัตถุประสงค์</label>
                    <textarea class="form-control mb-4" name="purpose" rows="2" placeholder="ไปเพื่อราชการเรื่องใด..." required></textarea>
                    
                    <div class="row g-2 p-3 bg-light rounded-3 border">
                        <div class="col-6 col-md-3">
                            <label class="form-label text-primary small fw-bold">วันเริ่ม</label>
                            <input type="date" class="form-control form-control-sm border-primary" name="startDate" required>
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label text-primary small fw-bold">เวลาเริ่ม</label>
                            <input type="time" class="form-control form-control-sm border-primary" name="startTime" required>
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label text-danger small fw-bold">วันสิ้นสุด</label>
                            <input type="date" class="form-control form-control-sm border-danger" name="endDate" required>
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label text-danger small fw-bold">เวลาสิ้นสุด</label>
                            <input type="time" class="form-control form-control-sm border-danger" name="endTime" required>
                        </div>
                    </div>
                </div>

                <div class="form-section-card shadow-sm border-0">
                    <div class="sub-title"><i class="bi bi-people me-2"></i>ผู้ร่วมเดินทาง</div>
                    <label class="form-label fw-bold">จำนวนผู้ร่วมเดินทาง (ไม่รวมคนขับ)</label>
                    <input type="number" class="form-control w-50 mb-3" name="passengerCount" min="0" value="0" required>
                    
                    <div class="passenger-group mt-3" id="passengerInputs">
                        <input type="text" class="form-control mb-2 rounded-3" name="passenger1" placeholder="ผู้ร่วมเดินทาง 1">
                        <input type="text" class="form-control mb-2 rounded-3" name="passenger2" placeholder="ผู้ร่วมเดินทาง 2">
                        <input type="text" class="form-control mb-2 rounded-3" name="passenger3" placeholder="ผู้ร่วมเดินทาง 3">
                        <input type="text" class="form-control mb-2 rounded-3" name="passenger4" placeholder="ผู้ร่วมเดินทาง 4">
                        <input type="text" class="form-control mb-2 rounded-3" name="passenger5" placeholder="ผู้ร่วมเดินทาง 5">
                        <input type="text" class="form-control mb-2 rounded-3" name="passenger6" placeholder="ผู้ร่วมเดินทาง 6">
                    </div>
                    
                    <div class="mt-3" id="fileUploadSection" style="display:none;">
                        <div class="alert alert-warning py-2 small border-0 shadow-sm">
                            <i class="bi bi-info-circle me-1"></i> เกิน 6 คน กรุณาแนบไฟล์รายชื่อ (PDF)
                        </div>
                        <label class="form-label fw-bold">แนบไฟล์รายชื่อ</label>
                        <input type="file" class="form-control" name="passengerFile" accept="application/pdf">
                    </div>
                </div>

                <button type="submit" class="btn-booking-main w-100 py-3 mt-4 border-0 shadow-lg">
                    ยืนยันการส่งคำขอจองรถ 🚗
                </button>
            </form>
        </div>
    </div>

    <div class="modal fade" id="submitModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0 bg-light" style="border-radius: 20px 20px 0 0;">
                    <h5 class="modal-title w-100 text-center fw-bold">ผลการทำงาน</h5>
                </div>
                <div class="modal-body text-center p-5">
                    <div id="loadingIcon" class="mb-3">
                        <div class="spinner-border text-primary" role="status" style="width: 3.5rem; height: 3.5rem; border-width: 0.3em;"></div>
                    </div>
                    <span id="modalText" class="fs-5 fw-medium">ระบบกำลังส่งข้อมูล...</span>
                </div>
                <div class="modal-footer border-0 justify-content-center pb-4" id="modalFooter" style="display:none;">
                    <button type="button" class="btn btn-primary px-5 py-2 rounded-pill fw-bold" data-bs-dismiss="modal">ตกลง</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
