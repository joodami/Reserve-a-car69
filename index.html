<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจองรถยนต์ - โรงเรียนพิมานพิทยาสรรค์</title>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { --primary: #1a5276; --accent: #2980b9; --gold: #f1c40f; }

        html, body { height: 100%; margin: 0; }
        body { 
            display: flex; 
            flex-direction: column; 
            font-family: 'Prompt', sans-serif; 
            background-color: #f8fafc; 
        }

        .app-header {
            background: #ffffff;
            text-align: center;
            border-bottom: 3px solid var(--primary);
            padding: 10px 5px 5px 5px;
            flex-shrink: 0;
        }

        .school-logo { height: 40px; }
        .app-title { font-size: 1.3rem; font-weight: 600; color: var(--primary); margin: 0; }
        .app-subtitle { font-size: 0.75rem; color: #64748b; margin-bottom: 5px; }

        .container-main { 
            max-width: 1100px; 
            margin: 10px auto; 
            padding: 0 15px 80px 15px; /* *** เพิ่มระยะด้านล่าง 80px เพื่อหลบปุ่มจากหน้า Hub *** */
            flex: 1 0 auto; 
            width: 100%; 
        }

        .btn-open-booking {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 400;
            transition: 0.2s;
        }

        .system-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 1px 10px rgba(0,0,0,0.03);
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }

        .card-header-custom {
            background: #f8fafc;
            color: var(--primary);
            padding: 8px;
            font-weight: 500;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .calendar-wrapper {
            position: relative;
            width: 100%;
            height: 500px;
        }
        @media (max-width: 768px) { .calendar-wrapper { height: 400px; } }
        .calendar-wrapper iframe { width: 100%; height: 100%; border: 0; }

        .section-title { color: var(--primary); border-left: 4px solid var(--gold); padding-left: 10px; margin: 12px 0 8px 0; font-weight: 500; }
        .form-control, .form-select { border-radius: 6px; padding: 7px 10px; border: 1px solid #cbd5e1; font-weight: 300; font-size: 0.9rem; }

        /* ปรับ Footer ให้มีความสูงชัดเจนและไม่โดนทับ */
        footer { 
            background: #ffffff; 
            padding: 25px 15px 40px 15px; /* เพิ่ม Padding ล่างเผื่อไว้ */
            text-align: center; 
            border-top: 1px solid #e2e8f0; 
            font-size: 0.8rem;
            color: #64748b;
            flex-shrink: 0;
            position: relative;
            z-index: 10; /* ให้อยู่เลเยอร์บน */
        }
    </style>
</head>
<body>

<header class="app-header">
    <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" alt="Logo" class="school-logo">
    <h1 class="app-title">PS-Sarabun</h1>
    <p class="app-subtitle">ระบบจองรถยนต์ส่วนราชการ โรงเรียนพิมานพิทยาสรรค์</p>
</header>

<main class="container-main">
    <div id="openBtnArea" class="text-center mb-3">
        <button id="showFormBtn" class="btn-open-booking">
            <i class="bi bi-calendar-plus me-1"></i> กดเพื่อเริ่มการจอง
        </button>
    </div>

    <div id="formSection" class="system-card" style="display:none;">
        <div class="card-header-custom">แบบฟอร์มขอใช้รถยนต์</div>
        <div class="card-body p-3">
            <form id="carForm">
                <div class="text-end mb-2">
                    <button type="button" id="hideFormBtn" class="btn btn-sm btn-link text-secondary text-decoration-none">ปิดฟอร์ม</button>
                </div>
                <div class="section-title">ข้อมูลผู้ขอ</div>
                <div class="row g-2">
                    <div class="col-md-6"><label class="mb-1 small">วันที่จอง</label><input type="date" name="bookDate" class="form-control" required></div>
                    <div class="col-md-6"><label class="mb-1 small">ชื่อ-นามสกุล</label><input type="text" name="name" class="form-control" required></div>
                    <div class="col-md-6"><label class="mb-1 small">โทรศัพท์</label><input type="tel" name="tel" class="form-control" required></div>
                    <div class="col-md-6">
                        <label class="mb-1 small">ตำแหน่ง</label>
                        <select name="position" class="form-select" required>
                            <option value="">-- เลือก --</option>
                            <option value="ผู้บริหาร">ผู้บริหาร</option>
                            <option value="ครู">ครู</option>
                            <option value="บุคลากร">บุคลากร</option>
                        </select>
                    </div>
                </div>
                <div class="section-title">รายละเอียด</div>
                <div class="row g-2">
                    <div class="col-md-6"><label class="mb-1 small">รถยนต์</label><select name="car" class="form-select" required><option value="">-- เลือก --</option><option value="รถ 4 ประตู">รถ 4 ประตู</option><option value="รถตู้">รถตู้</option><option value="รถ 6 ล้อ">รถ 6 ล้อ</option></select></div>
                    <div class="col-md-6"><label class="mb-1 small">สถานที่</label><input type="text" name="location" class="form-control" required></div>
                    <div class="col-12"><label class="mb-1 small">วัตถุประสงค์</label><textarea name="purpose" class="form-control" rows="2" required></textarea></div>
                    <div class="col-6 col-md-3"><label class="text-primary mb-1 small">วันเริ่ม</label><input type="date" name="startDate" class="form-control" required></div>
                    <div class="col-6 col-md-3"><label class="text-primary mb-1 small">เวลาเริ่ม</label><input type="time" name="startTime" class="form-control" required></div>
                    <div class="col-6 col-md-3"><label class="text-danger mb-1 small">วันกลับ</label><input type="date" name="endDate" class="form-control" required></div>
                    <div class="col-6 col-md-3"><label class="text-danger mb-1 small">เวลากลับ</label><input type="time" name="endTime" class="form-control" required></div>
                </div>
                <div class="section-title">ผู้ร่วมเดินทาง</div>
                <div class="row g-2">
                    <div class="col-md-6"><label class="mb-1 small">จำนวนคน</label><input type="number" name="passengerCount" id="pCount" class="form-control" min="0" value="0"></div>
                    <div class="col-12"><div class="row g-1" id="pList"></div></div>
                    <div id="fileUpload" class="col-12" style="display:none;"><input type="file" id="pPdf" class="form-control" accept=".pdf"></div>
                </div>
                <button type="submit" class="btn-open-booking w-100 mt-4">ยืนยันการจอง 🚕</button>
            </form>
        </div>
    </div>

    <div class="system-card">
        <div class="card-header-custom">ตรวจสอบคิวรถยนต์</div>
        <div class="calendar-wrapper" id="calendarBox"></div>
    </div>
</main>

<footer>
    © 2026 งานยานพาหนะ โรงเรียนพิมานพิทยาสรรค์<br>
    <b>นางพิชามญชุ์ ทองกรด โทร.093-5783797</b>
</footer>

<div id="loader" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div class="spinner-border text-primary"></div>
</div>

<div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow" style="border-radius: 12px;">
            <div class="modal-body text-center p-4">
                <div class="text-success mb-2"><i class="bi bi-check-circle-fill" style="font-size: 2rem;"></i></div>
                <h6 class="fw-bold">จองรถยนต์สำเร็จ!</h6>
                <p class="text-muted small">ระบบได้ส่งคำขอไปยังงานยานพาหนะเรียบร้อยแล้วค่ะ</p>
                <button type="button" class="btn btn-primary btn-sm px-4 py-2 mt-2" onclick="location.reload()">ตกลง</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwlDYshdlJdNS_xwtKGs90EZ51N8wZsPRzoeOzi_YgdLAgRm-QIxlJX3wUnw-Danxr1/exec";
    const successModal = new bootstrap.Modal(document.getElementById('successModal'));

    window.onload = function() {
        const calendarBox = document.getElementById('calendarBox');
        calendarBox.innerHTML = `<iframe src="https://calendar.google.com/calendar/embed?src=c_ea546f07317ff6dcdbf73cee14ab645a8e154664a02554eef13e6e08423e39c1%40group.calendar.google.com&ctz=Asia/Bangkok&mode=MONTH"></iframe>`;
    };

    const showFormBtn = document.getElementById('showFormBtn');
    const hideFormBtn = document.getElementById('hideFormBtn');
    const formSection = document.getElementById('formSection');
    const openBtnArea = document.getElementById('openBtnArea');

    showFormBtn.onclick = () => { formSection.style.display = 'block'; openBtnArea.style.display = 'none'; };
    hideFormBtn.onclick = () => { formSection.style.display = 'none'; openBtnArea.style.display = 'block'; };

    const pCount = document.getElementById('pCount');
    const pList = document.getElementById('pList');
    const fileUpload = document.getElementById('fileUpload');

    pCount.oninput = function() {
        const val = parseInt(this.value) || 0;
        pList.innerHTML = '';
        if (val > 0 && val <= 6) {
            fileUpload.style.display = 'none';
            for (let i = 1; i <= val; i++) {
                pList.innerHTML += `<div class="col-md-4 col-12"><input type="text" name="passenger${i}" class="form-control mb-1" placeholder="ชื่อคนที่ ${i}" required></div>`;
            }
        } else if (val > 6) {
            fileUpload.style.display = 'block';
        } else {
            fileUpload.style.display = 'none';
        }
    };

    const carForm = document.getElementById('carForm');
    carForm.onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loader').style.display = 'flex';
        const formData = new FormData(carForm);
        const data = Object.fromEntries(formData.entries());
        const pdfFile = document.getElementById('pPdf');

        if (parseInt(data.passengerCount) > 6 && pdfFile.files.length > 0) {
            const file = pdfFile.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                data.passengerFile = reader.result.split(',')[1];
                data.passengerFileName = file.name;
                await postData(data);
            };
        } else {
            await postData(data);
        }
    };

    async function postData(payload) {
        try {
            const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const res = await response.json();
            if (res.status === "success") {
                document.getElementById('loader').style.display = 'none';
                successModal.show();
            } else {
                alert("ผิดพลาด: " + res.message);
                document.getElementById('loader').style.display = 'none';
            }
        } catch (err) {
            alert("ระบบขัดข้อง");
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
