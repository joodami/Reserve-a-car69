<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS-Sarabun | โรงเรียนพิมานพิทยาสรรค์</title>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --primary: #1a5276; 
            --accent: #2980b9; 
            --gold: #f1c40f; 
            --sidebar-width: 280px;
        }

        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar Style --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .school-logo { height: 60px; margin-bottom: 10px; }
        .brand-name { font-size: 1.2rem; font-weight: 600; margin: 0; color: var(--gold); }

        .nav-menu {
            flex: 1;
            padding: 20px 0;
            overflow-y: auto;
        }

        .nav-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: 0.2s;
            border-left: 4px solid transparent;
            cursor: pointer;
            margin-bottom: 5px;
        }

        .nav-item i { font-size: 1.2rem; margin-right: 15px; }
        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-item.active {
            background: rgba(255,255,255,0.15);
            color: var(--gold);
            border-left: 4px solid var(--gold);
            font-weight: 500;
        }

        /* --- Main Content --- */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            background: white;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            justify-content: space-between;
        }

        .content-area {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }

        .system-card {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            border: 1px solid #cbd5e1;
            min-height: 400px;
            padding: 25px;
        }

        .view-title {
            color: var(--primary);
            border-left: 5px solid var(--gold);
            padding-left: 12px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* --- Mobile Toggle --- */
        #mobile-toggle { display: none; }

        @media (max-width: 992px) {
            .sidebar {
                position: fixed;
                left: -100%;
                height: 100%;
            }
            .sidebar.active { left: 0; }
            #mobile-toggle { display: block; }
        }

        footer {
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: center;
            padding: 15px;
            background: white;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" alt="Logo" class="school-logo">
            <h1 class="brand-name">PS-Sarabun</h1>
            <small>ระบบลงทะเบียนหนังสือรับ</small>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-item active" onclick="switchView('view1', this)">
                <i class="bi bi-file-earmark-plus"></i>
                <span>ลงทะเบียนหนังสือใหม่</span>
            </div>
            <div class="nav-item" onclick="switchView('view2', this)">
                <i class="bi bi-journal-text"></i>
                <span>หนังสือรับทั้งหมด</span>
            </div>
            <div class="nav-item" onclick="switchView('view3', this)">
                <i class="bi bi-reply-all"></i>
                <span>หนังสือส่งกลับจากบริหาร</span>
            </div>
            <div class="nav-item" onclick="switchView('view4', this)">
                <i class="bi bi-printer"></i>
                <span>พิมพ์ทะเบียนหนังสือรับ</span>
            </div>
        </nav>

        <div class="p-3 text-center border-top border-secondary">
             <small class="text-white-50">งานยานพาหนะ & สารบรรณ</small>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="main-wrapper">
        <header class="top-bar">
            <button class="btn btn-light" id="mobile-toggle" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>
            <div class="d-none d-md-block text-muted">
                <i class="bi bi-calendar3 me-2"></i> วันที่: <span id="currentDate"></span>
            </div>
            <div class="user-profile">
                <span class="badge bg-light text-dark p-2">
                    <i class="bi bi-person-circle me-1"></i> เจ้าหน้าที่สารบรรณ
                </span>
            </div>
        </header>

        <main class="content-area">
            <div class="system-card">
                <!-- เนื้อหาจะเปลี่ยนไปตามเมนูที่เลือก -->
                <div id="content-display">
                    <h4 class="view-title" id="page-title">นำหนังสือรับเข้าแฟ้ม</h4>
                    <div id="view-body">
                        <!-- ส่วนนี้จะโหลดฟอร์มหรือตารางจากระบบย่อย -->
                        <p class="text-muted">กำลังเตรียมเนื้อหาระบบ...</p>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            © 2026 งานยานพาหนะ โรงเรียนพิมานพิทยาสรรค์ | ติดต่อสอบถาม: นางพิชามญชุ์ ทองกรด
        </footer>
    </div>

    <script>
        // ฟังก์ชันเปลี่ยนหน้า (View)
        function switchView(viewId, element) {
            // ลบ class active จากทุกเมนู
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            // เพิ่ม class active ให้เมนูที่เลือก
            element.classList.add('active');

            const title = document.getElementById('page-title');
            const body = document.getElementById('view-body');

            // อัปเดตเนื้อหาเบื้องต้น (เดี๋ยวเราจะเอาโค้ดระบบมาใส่ใน switch นี้ค่ะ)
            switch(viewId) {
                case 'view1':
                    title.innerText = "นำหนังสือรับเข้าแฟ้ม (ลงทะเบียนใหม่)";
                    body.innerHTML = "โหลดแบบฟอร์มลงทะเบียน...";
                    break;
                case 'view2':
                    title.innerText = "หนังสือรับที่ลงทะเบียนแล้ว";
                    body.innerHTML = "โหลดรายการหนังสือทั้งหมด...";
                    break;
                case 'view3':
                    title.innerText = "หนังสือส่งกลับจากฝ่ายบริหาร";
                    body.innerHTML = "โหลดหนังสือที่รอสารบรรณจัดการต่อ...";
                    break;
                case 'view4':
                    title.innerText = "พิมพ์ทะเบียนหนังสือรับ (PDF)";
                    body.innerHTML = "ระบบพิมพ์รายงาน...";
                    break;
            }

            // ปิด Sidebar อัตโนมัติในมือถือหลังจากกดเลือก
            if (window.innerWidth <= 992) {
                toggleSidebar();
            }
        }

        // Toggle Sidebar สำหรับมือถือ
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // แสดงวันที่ปัจจุบัน
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('th-TH', options);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
