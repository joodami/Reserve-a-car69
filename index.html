<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>งานยานพาหนะ โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=K2D:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="banner-wrapper">
        <img id="banner-img" src="https://raw.githubusercontent.com/joodami/school-assets/main/banner%20car.jpg" alt="แบนเนอร์งานยานพาหนะ">
    </header>

    <h2 class="form-header">🚗 งานยานพาหนะ สำนักงานอำนวยการ</h2>

    <div class="main-container">
        <div class="calendar-card-wrapper mb-5">
            <h3 class="calendar-header">
                <i class="bi bi-calendar-check-fill me-2"></i> ปฏิทินการใช้รถยนต์ส่วนราชการ
            </h3>
            <div class="calendar-container shadow-sm border">
                <iframe src="https://calendar.google.com/calendar/embed?src=c_ea546f07317ff6dcdbf73cee14ab645a8e154664a02554eef13e6e08423e39c1%40group.calendar.google.com&ctz=Asia/Bangkok&mode=MONTH" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>

        <div class="booking-action-area text-center">
            <p class="text-muted small mb-3">ตรวจสอบวันว่างจากปฏิทินด้านบน แล้วกดปุ่มเพื่อลงทะเบียน</p>
            <button id="showFormBtn" class="btn-booking-main">
                <i class="bi bi-plus-circle-fill me-2"></i> กดเพื่อจองคิวรถยนต์
            </button>
        </div>

        <div class="card-form shadow-lg" id="formSection" style="display:none;">
            <form id="carForm">
                <div class="text-end mb-3">
                    <button type="button" id="cancelBookingBtn" class="btn btn-outline-danger btn-sm">❌ ยกเลิกการจอง</button>
                </div>

                <div class="form-section-card">
                    <div class="sub-title"><i class="bi bi-person-badge me-2"></i>ข้อมูลผู้จอง</div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">วันที่ทำการจอง</label>
                            <input type="date" class="form-control" name="bookDate" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">ชื่อ-นามสกุล</label>
                            <input type="text" class="form-control" name="name" placeholder="ระบุชื่อผู้จอง" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">โทรศัพท์</label>
                            <input type="tel" class="form-control" name="tel" placeholder="08x-xxxxxxx" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">ตำแหน่ง</label>
                            <select class="form-select" name="position" required>
                                <option value="">-- เลือกตำแหน่ง --</option>
                                <option value="ผู้บริหาร">ผู้บริหาร</option>
                                <option value="ครู">ครู</option>
                                <option value="บุคลากรทางการศึกษา">บุคลากรทางการศึกษา</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section-card">
                    <div class="sub-title"><i class="bi bi-moped me-2"></i>รายละเอียดการเดินทาง</div>
                    <label class="form-label text-primary">รถที่ต้องการใช้</label>
                    <select class="form-select mb-3" name="car" required>
                        <option value="">-- เลือกรถที่ต้องการใช้ --</option>
                        <option value="รถ 4 ประตู">รถ 4 ประตู</option>
                        <option value="รถตู้">รถตู้</option>
                        <option value="รถ 6 ล้อ">รถ 6 ล้อ</option>
                    </select>
                    
                    <label class="form-label">สถานที่เดินทาง</label>
                    <input type="text" class="form-control mb-3" name="location" placeholder="ระบุจุดหมายปลายทาง" required>
                    
                    <label class="form-label">วัตถุประสงค์</label>
                    <textarea class="form-control mb-4" name="purpose" rows="2" placeholder="ไปเพื่อราชการเรื่องใด..." required></textarea>
                    
                    <div class="row g-2 p-3 bg-light rounded-3 border">
                        <div class="col-6 col-md-3">
                            <label class="form-label text-primary small fw-bold">วันเริ่ม</label>
                            <input type="date" class="form-control form-control-sm" name="startDate" required>
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label text-primary small fw-bold">เวลาเริ่ม</label>
                            <input type="time" class="form-control form-control-sm" name="startTime" required>
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label text-danger small fw-bold">วันสิ้นสุด</label>
                            <input type="date" class="form-control form-control-sm" name="endDate" required>
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label text-danger small fw-bold">เวลาสิ้นสุด</label>
                            <input type="time" class="form-control form-control-sm" name="endTime" required>
                        </div>
                    </div>
                </div>

                <div class="form-section-card">
                    <div class="sub-title"><i class="bi bi-people me-2"></i>ผู้ร่วมเดินทาง</div>
                    <label class="form-label">จำนวนผู้ร่วมเดินทาง (ไม่รวมคนขับ)</label>
                    <input type="number" class="form-control w-50" name="passengerCount" min="0" value="0" required>
                    
                    <div class="passenger-group mt-3" id="passengerInputs">
                        <input type="text" class="form-control mb-2" name="passenger1" placeholder="ผู้ร่วมเดินทาง 1">
                        <input type="text" class="form-control mb-2" name="passenger2" placeholder="ผู้ร่วมเดินทาง 2">
                        <input type="text" class="form-control mb-2" name="passenger3" placeholder="ผู้ร่วมเดินทาง 3">
                        <input type="text" class="form-control mb-2" name="passenger4" placeholder="ผู้ร่วมเดินทาง 4">
                        <input type="text" class="form-control mb-2" name="passenger5" placeholder="ผู้ร่วมเดินทาง 5">
                        <input type="text" class="form-control mb-2" name="passenger6" placeholder="ผู้ร่วมเดินทาง 6">
                    </div>
                    
                    <div class="mt-3" id="fileUploadSection" style="display:none;">
                        <div class="alert alert-info py-2 small">
                            <i class="bi bi-info-circle me-1"></i> กรณีเดินทางเกิน 6 คน กรุณาแนบไฟล์รายชื่อเพิ่มเติม
                        </div>
                        <label class="form-label">แนบไฟล์รายชื่อ (PDF เท่านั้น)</label>
                        <input type="file" class="form-control" name="passengerFile" accept="application/pdf">
                    </div>
                </div>

                <button type="submit" class="btn-booking-main w-100 py-3 mt-4 border-0">
                    ยืนยันการส่งคำขอจองรถ 🚗
                </button>
            </form>
        </div>
    </div>

    <div class="modal fade" id="submitModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 bg-light">
                    <h5 class="modal-title w-100 text-center fw-bold">สถานะการทำงาน</h5>
                </div>
                <div class="modal-body text-center p-5">
                    <div id="loadingIcon" class="mb-3">
                        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
                    </div>
                    <span id="modalText" class="fs-5">ระบบกำลังประมวลผล...</span>
                </div>
                <div class="modal-footer border-0 justify-content-center" id="modalFooter" style="display:none;">
                    <button type="button" class="btn btn-primary px-5 rounded-pill" data-bs-dismiss="modal">ตกลง</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
