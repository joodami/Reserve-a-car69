<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองรถยนต์ - โรงเรียนพิมานพิทยาสรรค์</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ================= PS-SARABUN STANDARD HEADER ================= */
        :root {
            --ps-blue: #1a5276;
            --ps-gold: #d4ac0d;
        }

        * { font-family: 'Prompt', sans-serif !important; }

        body { background-color: #f4f7f6; margin: 0; }

        /* แบนเนอร์สไตล์เดียวกับระบบสืบค้น (PS-Sarabun) */
        .ps-header {
            background: linear-gradient(rgba(26, 82, 118, 0.9), rgba(26, 82, 118, 0.9)), 
                        url('https://www.transparenttextures.com/patterns/gplay.png'); /* ปรับตามพื้นหลังจริงของคุณครู */
            background-color: var(--ps-blue);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 6px solid var(--ps-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .ps-title-top {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .ps-system-name {
            font-size: 1.4rem;
            font-weight: 400;
            background: rgba(255,255,255,0.15);
            display: inline-block;
            padding: 5px 25px;
            border-radius: 50px;
            margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* --- ส่วนเนื้อหา --- */
        .container-main { max-width: 850px; margin: -20px auto 50px; padding: 0 15px; position: relative; z-index: 5; }

        .card-ps {
            background: white;
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 25px;
        }

        .btn-ps-submit {
            background-color: var(--ps-blue);
            color: white;
            padding: 12px 0;
            border-radius: 10px;
            font-weight: 500;
            border: none;
            width: 100%;
            transition: 0.3s;
        }

        .btn-ps-submit:hover { background-color: #154360; transform: translateY(-2px); }

        .section-label {
            color: var(--ps-blue);
            font-weight: 600;
            border-left: 5px solid var(--ps-gold);
            padding-left: 15px;
            margin: 25px 0 15px;
        }

        .calendar-box {
            position: relative;
            padding-top: 60%;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #ddd;
        }
        .calendar-box iframe { position: absolute; top:0; left:0; width:100%; height:100%; }

        .ps-footer {
            text-align: center;
            padding: 30px;
            color: #7f8c8d;
            background: white;
            border-top: 1px solid #eee;
        }

        @media (max-width: 768px) {
            .ps-title-top { font-size: 1.6rem; }
            .ps-system-name { font-size: 1.1rem; }
            .calendar-box { padding-top: 140%; }
        }
    </style>
</head>
<body>

    <header class="ps-header">
        <div class="ps-title-top">PS-Sarabun</div>
        <div class="ps-system-name">ระบบจองรถยนต์ โรงเรียนพิมานพิทยาสรรค์</div>
    </header>

    <div class="container-main">
        <div class="text-center mb-4">
            <button id="showFormBtn" class="btn btn-ps-submit shadow" style="width: auto; padding-left: 40px; padding-right: 40px;">
                <i class="bi bi-pencil-square me-2"></i> บันทึกข้อมูลการจองรถ
            </button>
        </div>

        <div class="card-ps" id="formSection" style="display:none;">
            <form id="carForm">
                <div class="d-flex justify-content-between mb-4">
                    <h5 class="fw-bold"><i class="bi bi-car-front me-2"></i>รายละเอียดการขอใช้รถยนต์</h5>
                    <button type="button" id="cancelBookingBtn" class="btn-close"></button>
                </div>

                <div class="section-label">ข้อมูลผู้ขอใช้</div>
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">วันที่ยื่นเรื่อง</label><input type="date" class="form-control" name="bookDate" required></div>
                    <div class="col-md-6"><label class="form-label">ชื่อ-นามสกุล</label><input type="text" class="form-control" name="name" required></div>
                    <div class="col-md-6"><label class="form-label">เบอร์โทรศัพท์</label><input type="tel" class="form-control" name="tel" required></div>
                    <div class="col-md-6">
                        <label class="form-label">ตำแหน่ง</label>
                        <select class="form-select" name="position" required>
                            <option value="">-- เลือก --</option>
                            <option value="ผู้บริหาร">ผู้บริหาร</option>
                            <option value="ครู">ครู</option>
                            <option value="บุคลากร">บุคลากร</option>
                        </select>
                    </div>
                </div>

                <div class="section-label">รายละเอียดเดินทาง</div>
                <div class="row g-3">
                    <div class="col-12"><label class="form-label">ประเภทรถยนต์</label><select class="form-select border-primary" name="car" required><option value="">-- เลือกประเภทรถ --</option><option value="รถ 4 ประตู">รถ 4 ประตู</option><option value="รถตู้">รถตู้</option><option value="รถ 6 ล้อ">รถ 6 ล้อ</option></select></div>
                    <div class="col-12"><label class="form-label">สถานที่ไป</label><input type="text" class="form-control" name="location" required></div>
                    <div class="col-12"><label class="form-label">วัตถุประสงค์</label><textarea class="form-control" name="purpose" rows="2" required></textarea></div>
                </div>

                <div class="p-3 bg-light rounded border mt-4">
                    <div class="row g-2 text-center">
                        <div class="col-6 col-md-3"><label class="small fw-bold">วันเริ่ม</label><input type="date" class="form-control" name="startDate" required></div>
                        <div class="col-6 col-md-3"><label class="small fw-bold">เวลา</label><input type="time" class="form-control" name="startTime" required></div>
                        <div class="col-6 col-md-3"><label class="small fw-bold text-danger">วันสิ้นสุด</label><input type="date" class="form-control" name="endDate" required></div>
                        <div class="col-6 col-md-3"><label class="small fw-bold text-danger">เวลา</label><input type="time" class="form-control" name="endTime" required></div>
                    </div>
                </div>

                <div class="mt-4">
                    <div class="section-label">จำนวนผู้ร่วมเดินทาง</div>
                    <div class="d-flex align-items-center mb-3">
                        <input type="number" class="form-control w-25" name="passengerCount" min="0" value="0" required>
                        <span class="ms-2">คน</span>
                    </div>
                    <div id="passengerInputs"></div>
                    <div id="fileUploadSection" style="display:none;" class="p-3 border border-dashed rounded mt-2 bg-light">
                        <label class="form-label text-danger small fw-bold">แนบไฟล์รายชื่อผู้เดินทาง (PDF)</label>
                        <input type="file" class="form-control" name="passengerFile" accept=".pdf" id="passengerFileInput">
                    </div>
                </div>

                <button type="submit" class="btn btn-ps-submit mt-4 shadow py-3">ยืนยันข้อมูลและขอใช้รถ</button>
            </form>
        </div>

        <div class="card-ps">
            <h5 class="text-center mb-4 fw-bold" style="color: var(--ps-blue)"><i class="bi bi-calendar3 me-2"></i>ตรวจสอบคิวรถยนต์</h5>
            <div class="calendar-box">
                <iframe src="https://calendar.google.com/calendar/embed?src=c_ea546f07317ff6dcdbf73cee14ab645a8e154664a02554eef13e6e08423e39c1%40group.calendar.google.com&ctz=Asia/Bangkok&mode=MONTH" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>
    </div>

    <div class="modal fade" id="submitModal" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-body text-center p-5">
                    <div id="loadingIcon" class="spinner-border text-primary mb-3"></div>
                    <div id="modalText" class="fw-bold">กำลังบันทึกข้อมูล...</div>
                    <div id="modalFooter" class="mt-4" style="display:none;">
                        <button type="button" class="btn btn-ps-submit px-5" data-bs-dismiss="modal" onclick="document.getElementById('cancelBookingBtn').click()">ตกลง</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="ps-footer">
        <p class="mb-1 fw-bold">© 2026 งานยานพาหนะ โรงเรียนพิมานพิทยาสรรค์</p>
        <div class="small">ผู้ดูแลระบบ: นางพิชามญชุ์ ทองกรด | โทร. 093-5783797</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // --- ฟังก์ชันควบคุม (เหมือนเดิม 100%) ---
        document.addEventListener('DOMContentLoaded', function() {
            const carForm = document.getElementById("carForm");
            const passengerCountInput = document.querySelector('input[name="passengerCount"]');
            const passengerInputsContainer = document.getElementById("passengerInputs");
            const fileUploadSection = document.getElementById("fileUploadSection");
            const fileInput = document.getElementById("passengerFileInput");
            const submitModal = new bootstrap.Modal(document.getElementById('submitModal'));

            passengerCountInput.addEventListener("input", function() {
                const count = Number(this.value) || 0;
                passengerInputsContainer.innerHTML = ""; 
                if (count > 0 && count <= 6) {
                    for (let i = 1; i <= count; i++) {
                        const input = document.createElement("input");
                        input.type = "text";
                        input.name = `passenger${i}`;
                        input.placeholder = `ชื่อผู้เดินทางคนที่ ${i}`;
                        input.className = "form-control mb-2";
                        input.required = true;
                        passengerInputsContainer.appendChild(input);
                    }
                    fileUploadSection.style.display = "none";
                } else if (count >= 7) {
                    fileUploadSection.style.display = "block";
                } else {
                    fileUploadSection.style.display = "none";
                }
            });

            carForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                document.getElementById('loadingIcon').style.display = "block";
                document.getElementById('modalFooter').style.display = "none";
                document.getElementById('modalText').innerText = "กำลังดำเนินการ...";
                submitModal.show();

                try {
                    const formData = new FormData(carForm);
                    const formDataObj = Object.fromEntries(formData.entries());
                    if (formDataObj.passengerCount >= 7 && fileInput.files.length > 0) {
                        formDataObj.passengerFile = await fileToBase64(fileInput.files[0]);
                        formDataObj.passengerFileName = fileInput.files[0].name;
                    }

                    const GAS_URL = "https://script.google.com/macros/s/AKfycbwlDYshdlJdNS_xwtKGs90EZ51N8wZsPRzoeOzi_YgdLAgRm-QIxlJX3wUnw-Danxr1/exec";
                    const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(formDataObj) });
                    const resData = await response.json();

                    if (resData.status === "success") {
                        document.getElementById('loadingIcon').style.display = "none";
                        document.getElementById('modalFooter').style.display = "block";
                        document.getElementById('modalText').innerHTML = `
                            <i class="bi bi-check-circle-fill text-success fs-1"></i><br>
                            จองรถยนต์เรียบร้อย!<br>
                            <a href="${resData.result.pdfUrl}" target="_blank" class="btn btn-sm btn-primary mt-3">เปิดดูใบขอใช้รถ PDF</a>`;
                        carForm.reset();
                    }
                } catch (err) {
                    document.getElementById('modalText').innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อระบบ";
                }
            });

            function fileToBase64(file) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
            }

            document.getElementById("showFormBtn").onclick = () => {
                document.getElementById("formSection").style.display = "block";
                document.getElementById("showFormBtn").parentElement.style.display = "none";
                document.getElementById("formSection").scrollIntoView({ behavior: 'smooth' });
            };
            document.getElementById("cancelBookingBtn").onclick = () => {
                document.getElementById("formSection").style.display = "none";
                document.getElementById("showFormBtn").parentElement.style.display = "block";
            };
        });
    </script>
</body>
</html>
