<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจองรถยนต์ - โรงเรียนพิมานพิทยาสรรค์</title>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&family=K2D:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root { --primary: #1a5276; --accent: #2980b9; --gold: #f1c40f; }

        body { 
            font-family: 'Prompt', 'K2D', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header Banner --- */
        .header-banner {
            background: #ffffff;
            padding: 25px 0;
            text-align: center;
            border-bottom: 6px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header-banner img { height: 75px; margin-bottom: 10px; }
        .header-banner h1 { font-size: 1.8rem; font-weight: 700; color: var(--primary); margin: 0; }

        .container-main { max-width: 1100px; margin: 30px auto; padding: 0 15px; flex: 1; width: 100%; }

        /* --- ปุ่มเปิดฟอร์ม --- */
        .btn-open-booking {
            background: linear-gradient(135deg, #1a5276 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(26, 82, 118, 0.2);
            transition: 0.3s;
        }

        .system-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 30px;
            border: none;
        }
        .card-header-custom {
            background: var(--primary);
            color: white;
            padding: 15px;
            font-weight: 700;
            text-align: center;
        }

        /* --- ปฏิทิน --- */
        .calendar-wrapper {
            position: relative;
            width: 100%;
            height: 600px;
            overflow: hidden;
            border-radius: 0 0 20px 20px;
        }
        @media (max-width: 768px) {
            .calendar-wrapper { height: 500px; }
            .header-banner h1 { font-size: 1.3rem; }
        }
        .calendar-wrapper iframe { width: 100%; height: 100%; border: 0; }

        .section-title {
            color: var(--primary);
            border-left: 5px solid var(--gold);
            padding-left: 12px;
            margin: 25px 0 15px 0;
            font-weight: 700;
        }

        .form-control, .form-select { border-radius: 10px; padding: 12px; background: #f8fafc; }

        /* --- Modal สำเร็จ --- */
        .modal-content-success {
            border-radius: 25px;
            border: none;
            text-align: center;
            padding: 30px;
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: #d4edda;
            color: #28a745;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }

        footer { background: #fff; padding: 25px; text-align: center; border-top: 1px solid #eee; font-size: 0.9rem; }
    </style>
</head>
<body>

<header class="header-banner">
    <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" alt="Logo">
    <h1>ระบบจองรถยนต์ส่วนราชการ</h1>
</header>

<div class="container-main">
    
    <div id="openBtnArea" class="text-center mb-4">
        <button id="showFormBtn" class="btn-open-booking">
            <i class="bi bi-calendar-plus me-2"></i> กดเพื่อเริ่มการจอง
        </button>
    </div>

    <div id="formSection" class="system-card" style="display:none;">
        <div class="card-header-custom">แบบฟอร์มขอใช้รถยนต์</div>
        <div class="card-body p-4">
            <form id="carForm">
                <div class="text-end mb-3">
                    <button type="button" id="hideFormBtn" class="btn btn-sm btn-outline-secondary rounded-pill">ปิดฟอร์ม</button>
                </div>

                <div class="section-title">ข้อมูลผู้ขอ</div>
                <div class="row g-3">
                    <div class="col-md-6"><label class="fw-bold">วันที่จอง</label><input type="date" name="bookDate" class="form-control" required></div>
                    <div class="col-md-6"><label class="fw-bold">ชื่อ-นามสกุล</label><input type="text" name="name" class="form-control" required></div>
                    <div class="col-md-6"><label class="fw-bold">โทรศัพท์</label><input type="tel" name="tel" class="form-control" required></div>
                    <div class="col-md-6">
                        <label class="fw-bold">ตำแหน่ง</label>
                        <select name="position" class="form-select" required>
                            <option value="">-- เลือก --</option>
                            <option value="ผู้บริหาร">ผู้บริหาร</option>
                            <option value="ครู">ครู</option>
                            <option value="บุคลากร">บุคลากร</option>
                        </select>
                    </div>
                </div>

                <div class="section-title">รายละเอียด</div>
                <div class="row g-3">
                    <div class="col-md-6"><label class="fw-bold">รถยนต์</label><select name="car" class="form-select" required><option value="">-- เลือก --</option><option value="รถ 4 ประตู">รถ 4 ประตู</option><option value="รถตู้">รถตู้</option><option value="รถ 6 ล้อ">รถ 6 ล้อ</option></select></div>
                    <div class="col-md-6"><label class="fw-bold">สถานที่</label><input type="text" name="location" class="form-control" required></div>
                    <div class="col-12"><label class="fw-bold">วัตถุประสงค์</label><textarea name="purpose" class="form-control" rows="2" required></textarea></div>
                    <div class="col-6 col-md-3"><label class="text-primary fw-bold">วันเริ่ม</label><input type="date" name="startDate" class="form-control" required></div>
                    <div class="col-6 col-md-3"><label class="text-primary fw-bold">เวลาเริ่ม</label><input type="time" name="startTime" class="form-control" required></div>
                    <div class="col-6 col-md-3"><label class="text-danger fw-bold">วันกลับ</label><input type="date" name="endDate" class="form-control" required></div>
                    <div class="col-6 col-md-3"><label class="text-danger fw-bold">เวลากลับ</label><input type="time" name="endTime" class="form-control" required></div>
                </div>

                <div class="section-title">ผู้ร่วมเดินทาง</div>
                <div class="row g-3">
                    <div class="col-md-6"><label class="fw-bold">จำนวนคน</label><input type="number" name="passengerCount" id="pCount" class="form-control" min="0" value="0"></div>
                    <div class="col-12"><div class="row g-2" id="pList"></div></div>
                    <div id="fileUpload" class="col-12" style="display:none;"><input type="file" id="pPdf" class="form-control" accept=".pdf"></div>
                </div>

                <button type="submit" class="btn-open-booking w-100 mt-4">ยืนยันการจอง 🚕</button>
            </form>
        </div>
    </div>

    <div class="system-card">
        <div class="card-header-custom"><i class="bi bi-calendar3 me-2"></i> ตรวจสอบคิวรถยนต์</div>
        <div class="calendar-wrapper" id="calendarBox"></div>
    </div>

</div>

<div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-content-success shadow-lg">
            <div class="icon-box">
                <i class="bi bi-check-lg"></i>
            </div>
            <h3 class="fw-bold text-success">จองรถยนต์สำเร็จ!</h3>
            <p class="text-muted">ระบบได้ส่งคำขอไปยังงานยานพาหนะเรียบร้อยแล้วค่ะ</p>
            <button type="button" class="btn btn-success rounded-pill px-5 py-2 mt-3" onclick="location.reload()">ตกลง</button>
        </div>
    </div>
</div>

<div id="loader" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
    <h5 class="mt-3 fw-bold">กำลังบันทึกข้อมูล...</h5>
</div>

<footer>
    © 2026 งานยานพาหนะ โรงเรียนพิมานพิทยาสรรค์<br>
    <b>นางพิชามญชุ์ ทองกรด โทร.093-5783797</b>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwlDYshdlJdNS_xwtKGs90EZ51N8wZsPRzoeOzi_YgdLAgRm-QIxlJX3wUnw-Danxr1/exec";
    
    const successModal = new bootstrap.Modal(document.getElementById('successModal'));

    window.onload = function() {
        const calendarBox = document.getElementById('calendarBox');
        const mode = window.innerWidth <= 768 ? 'AGENDA' : 'MONTH';
        calendarBox.innerHTML = `<iframe src="https://calendar.google.com/calendar/embed?src=c_ea546f07317ff6dcdbf73cee14ab645a8e154664a02554eef13e6e08423e39c1%40group.calendar.google.com&ctz=Asia/Bangkok&mode=${mode}"></iframe>`;
    };

    const showFormBtn = document.getElementById('showFormBtn');
    const hideFormBtn = document.getElementById('hideFormBtn');
    const formSection = document.getElementById('formSection');
    const openBtnArea = document.getElementById('openBtnArea');

    showFormBtn.onclick = () => { formSection.style.display = 'block'; openBtnArea.style.display = 'none'; };
    hideFormBtn.onclick = () => { formSection.style.display = 'none'; openBtnArea.style.display = 'block'; };

    const pCount = document.getElementById('pCount');
    const pList = document.getElementById('pList');
    const fileUpload = document.getElementById('fileUpload');

    pCount.oninput = function() {
        const val = parseInt(this.value) || 0;
        pList.innerHTML = '';
        if (val > 0 && val <= 6) {
            fileUpload.style.display = 'none';
            for (let i = 1; i <= val; i++) {
                pList.innerHTML += `<div class="col-md-4 col-12"><input type="text" name="passenger${i}" class="form-control mb-1" placeholder="ชื่อคนที่ ${i}" required></div>`;
            }
        } else if (val > 6) {
            fileUpload.style.display = 'block';
        } else {
            fileUpload.style.display = 'none';
        }
    };

    const carForm = document.getElementById('carForm');
    carForm.onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loader').style.display = 'flex';
        const formData = new FormData(carForm);
        const data = Object.fromEntries(formData.entries());
        const pdfFile = document.getElementById('pPdf');

        if (parseInt(data.passengerCount) > 6 && pdfFile.files.length > 0) {
            const file = pdfFile.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                data.passengerFile = reader.result.split(',')[1];
                data.passengerFileName = file.name;
                await postData(data);
            };
        } else {
            await postData(data);
        }
    };

    async function postData(payload) {
        try {
            const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const res = await response.json();
            if (res.status === "success") {
                document.getElementById('loader').style.display = 'none';
                successModal.show(); // แสดง Modal สวยงามแทน Alert
            } else {
                alert("ผิดพลาด: " + res.message);
                document.getElementById('loader').style.display = 'none';
            }
        } catch (err) {
            alert("ระบบขัดข้อง");
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>

</body>
</html>
