<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองรถยนต์ - โรงเรียนพิมานพิทยาสรรค์</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ================= HUB STANDARD UI (COMPACT) ================= */
        :root {
            --ps-navy: #1a5276;
            --ps-gold: #d4ac0d;
            --ps-bg: #f2f5f8;
        }

        * { font-family: 'Prompt', sans-serif !important; }

        body { background-color: var(--ps-bg); color: #2c3e50; margin: 0; }

        /* --- Banner มาตรฐานเดียวกับหน้าแรกที่รวมเมนู --- */
        .ps-standard-header {
            background-color: white;
            padding: 15px 10px; /* ปรับความสูงให้กะทัดรัด */
            text-align: center;
            border-bottom: 4px solid var(--ps-navy);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .ps-logo-standard {
            height: 70px; /* ขนาดมาตรฐานหน้าแรก */
            margin-bottom: 8px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .ps-brand-standard {
            font-size: 1.8rem; /* ขนาดฟอนต์มาตรฐานหน้า Hub */
            font-weight: 700;
            color: var(--ps-navy);
            margin: 0;
            line-height: 1.2;
        }

        .ps-subtitle-standard {
            font-size: 1.1rem; /* ขนาดฟอนต์รอง */
            color: #666;
            margin: 3px 0;
            font-weight: 400;
        }

        /* --- ส่วนเนื้อหา --- */
        .main-container { max-width: 800px; margin: 25px auto; padding: 0 15px; }

        .card-ps {
            background: white;
            border-radius: 12px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 25px;
            margin-bottom: 20px;
        }

        .btn-ps-action {
            background-color: var(--ps-navy);
            color: white;
            padding: 10px 35px;
            border-radius: 8px;
            font-weight: 500;
            border: none;
            transition: 0.3s;
        }

        .btn-ps-action:hover {
            background-color: #154360;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 82, 118, 0.2);
        }

        .ps-section-label {
            color: var(--ps-navy);
            font-weight: 600;
            font-size: 1rem;
            border-left: 4px solid var(--ps-gold);
            padding-left: 12px;
            margin: 20px 0 12px;
        }

        .calendar-box {
            position: relative;
            padding-top: 60%;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .calendar-box iframe { position: absolute; top:0; left:0; width:100%; height:100%; }

        .ps-footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            color: #888;
            background: white;
            border-top: 1px solid #eee;
        }

        @media (max-width: 768px) {
            .ps-brand-standard { font-size: 1.5rem; }
            .ps-subtitle-standard { font-size: 1rem; }
            .ps-logo-standard { height: 60px; }
            .calendar-box { padding-top: 150%; }
        }
    </style>
</head>
<body>

    <header class="ps-standard-header">
        <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" alt="Logo" class="ps-logo-standard">
        <h1 class="ps-brand-standard">PS-Sarabun</h1>
        <p class="ps-subtitle-standard">ระบบจองรถยนต์ โรงเรียนพิมานพิทยาสรรค์</p>
    </header>

    <div class="main-container">
        <div class="text-center mb-4">
            <button id="showFormBtn" class="btn btn-ps-action shadow-sm">
                <i class="bi bi-pencil-square me-2"></i> บันทึกข้อมูลการจองรถ
            </button>
        </div>

        <div class="card-ps" id="formSection" style="display:none;">
            <form id="carForm">
                <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                    <h6 class="fw-bold m-0" style="color: var(--ps-navy);">แบบฟอร์มขอใช้รถยนต์</h6>
                    <button type="button" id="cancelBookingBtn" class="btn-close"></button>
                </div>

                <div class="ps-section-label">ข้อมูลผู้ขอใช้</div>
                <div class="row g-2 mb-3">
                    <div class="col-md-6"><label class="small">วันที่จอง</label><input type="date" class="form-control form-control-sm" name="bookDate" required></div>
                    <div class="col-md-6"><label class="small">ชื่อ-นามสกุล</label><input type="text" class="form-control form-control-sm" name="name" required></div>
                    <div class="col-md-6"><label class="small">เบอร์โทร</label><input type="tel" class="form-control form-control-sm" name="tel" required></div>
                    <div class="col-md-6">
                        <label class="small">ตำแหน่ง</label>
                        <select class="form-select form-select-sm" name="position" required>
                            <option value="">-- เลือก --</option>
                            <option value="ผู้บริหาร">ผู้บริหาร</option>
                            <option value="ครู">ครู</option>
                            <option value="บุคลากร">บุคลากร</option>
                        </select>
                    </div>
                </div>

                <div class="ps-section-label">รายละเอียดการใช้รถ</div>
                <div class="row g-2">
                    <div class="col-12"><label class="small">ประเภทรถ</label><select class="form-select form-select-sm" name="car" required><option value="">-- เลือกรถ --</option><option value="รถ 4 ประตู">รถ 4 ประตู</option><option value="รถตู้">รถตู้</option><option value="รถ 6 ล้อ">รถ 6 ล้อ</option></select></div>
                    <div class="col-12"><label class="small">สถานที่ปลายทาง</label><input type="text" class="form-control form-control-sm" name="location" required></div>
                    <div class="col-12"><label class="small">วัตถุประสงค์</label><textarea class="form-control form-control-sm" name="purpose" rows="2" required></textarea></div>
                </div>

                <div class="p-2 bg-light rounded border mt-3">
                    <div class="row g-1 text-center">
                        <div class="col-3"><label class="x-small fw-bold">วันเริ่ม</label><input type="date" class="form-control form-control-sm px-1" name="startDate" required></div>
                        <div class="col-3"><label class="x-small fw-bold">เวลา</label><input type="time" class="form-control form-control-sm px-1" name="startTime" required></div>
                        <div class="col-3"><label class="x-small fw-bold text-danger">วันสิ้นสุด</label><input type="date" class="form-control form-control-sm px-1" name="endDate" required></div>
                        <div class="col-3"><label class="x-small fw-bold text-danger">เวลา</label><input type="time" class="form-control form-control-sm px-1" name="endTime" required></div>
                    </div>
                </div>

                <div class="mt-3">
                    <div class="ps-section-label">ผู้ร่วมเดินทาง</div>
                    <div class="d-flex align-items-center mb-2">
                        <input type="number" class="form-control form-control-sm w-25" name="passengerCount" min="0" value="0" required>
                        <span class="ms-2 small">คน</span>
                    </div>
                    <div id="passengerInputs"></div>
                    <div id="fileUploadSection" style="display:none;" class="p-2 border border-dashed rounded mt-2 bg-white text-center">
                        <label class="text-danger x-small fw-bold">แนบรายชื่อผู้เดินทาง (PDF)</label>
                        <input type="file" class="form-control form-control-sm mt-1" name="passengerFile" accept=".pdf" id="passengerFileInput">
                    </div>
                </div>

                <button type="submit" class="btn btn-ps-action w-100 mt-4 py-2 shadow-sm">ยืนยันข้อมูลการจอง</button>
            </form>
        </div>

        <div class="card-ps">
            <h6 class="text-center mb-3 fw-bold" style="color: var(--ps-navy)"><i class="bi bi-calendar3 me-2"></i>ปฏิทินคิวรถยนต์</h6>
            <div class="calendar-box">
                <iframe src="https://calendar.google.com/calendar/embed?src=c_ea546f07317ff6dcdbf73cee14ab645a8e154664a02554eef13e6e08423e39c1%40group.calendar.google.com&ctz=Asia/Bangkok&mode=MONTH" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>
    </div>

    <footer class="ps-footer">
        <p class="mb-0">© 2026 งานยานพาหนะ โรงเรียนพิมานพิทยาสรรค์</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // --- ฟังก์ชันควบคุมเดิม 100% ---
        document.addEventListener('DOMContentLoaded', function() {
            const carForm = document.getElementById("carForm");
            const passengerCountInput = document.querySelector('input[name="passengerCount"]');
            const passengerInputsContainer = document.getElementById("passengerInputs");
            const fileUploadSection = document.getElementById("fileUploadSection");
            const fileInput = document.getElementById("passengerFileInput");

            passengerCountInput.addEventListener("input", function() {
                const count = Number(this.value) || 0;
                passengerInputsContainer.innerHTML = ""; 
                if (count > 0 && count <= 6) {
                    for (let i = 1; i <= count; i++) {
                        const input = document.createElement("input");
                        input.type = "text";
                        input.name = `passenger${i}`;
                        input.placeholder = `ชื่อคนที่ ${i}`;
                        input.className = "form-control form-control-sm mb-1";
                        input.required = true;
                        passengerInputsContainer.appendChild(input);
                    }
                    fileUploadSection.style.display = "none";
                } else if (count >= 7) {
                    fileUploadSection.style.display = "block";
                } else {
                    fileUploadSection.style.display = "none";
                }
            });

            carForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                alert("กำลังส่งข้อมูล...");
                try {
                    const formData = new FormData(carForm);
                    const formDataObj = Object.fromEntries(formData.entries());
                    if (formDataObj.passengerCount >= 7 && fileInput.files.length > 0) {
                        formDataObj.passengerFile = await fileToBase64(fileInput.files[0]);
                        formDataObj.passengerFileName = fileInput.files[0].name;
                    }
                    const GAS_URL = "https://script.google.com/macros/s/AKfycbwlDYshdlJdNS_xwtKGs90EZ51N8wZsPRzoeOzi_YgdLAgRm-QIxlJX3wUnw-Danxr1/exec";
                    const response = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(formDataObj) });
                    const resData = await response.json();
                    if (resData.status === "success") {
                        alert("จองสำเร็จ!");
                        window.open(resData.result.pdfUrl, '_blank');
                        carForm.reset();
                    }
                } catch (err) { alert("เกิดข้อผิดพลาด"); }
            });

            function fileToBase64(file) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                });
            }

            document.getElementById("showFormBtn").onclick = () => {
                document.getElementById("formSection").style.display = "block";
                document.getElementById("showFormBtn").parentElement.style.display = "none";
            };
            document.getElementById("cancelBookingBtn").onclick = () => {
                document.getElementById("formSection").style.display = "none";
                document.getElementById("showFormBtn").parentElement.style.display = "block";
            };
        });
    </script>
</body>
</html>
